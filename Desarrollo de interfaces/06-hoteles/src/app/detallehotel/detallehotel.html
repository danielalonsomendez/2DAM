<b style="font-size: 24px;">HOTEL</b>

<hr>
<p>Descripcion: {{ hotel?.documentDescription }}</p>

<a href={{hotel?.web}}> Pagina web</a>
<hr>
<button (click) = "abrirpaginaweb()" class="btn btn-info"> IR A LA PAGINA WEB</button>

<button (click) = "abrirMapa1(hotel?.address)" class="btn btn-info"> VER UBICACION 1</button>
