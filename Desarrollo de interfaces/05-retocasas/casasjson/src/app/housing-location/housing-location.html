<section class="listing" (click)="goToLearnMore()">
    <img class="listing-photo" src="casas/{{housingLocation.photo}}" alt="Exterior photo of {{ housingLocation.name }}"
        crossorigin />
    <h2 class="listing-heading">{{ housingLocation.name }}</h2>
    <p class="listing-location">{{ housingLocation.city }}, {{ housingLocation.state }}</p>
</section>
